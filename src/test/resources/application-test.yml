spring:
  jpa:
    hibernate:
      ddl-auto: create-drop

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope:
              - openid

jwt:
  secret-key: test-secret-key-for-hs256-token-signing
  access-ttl: 30m

refresh-token:
  ttl: 7d

app:
  oauth2:
    success-redirect-url: http://localhost:3000/auth/success